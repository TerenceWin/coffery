services:
  postgres:
    image: postgres:16-alpine
    container_name: coffery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coffery
      POSTGRES_PASSWORD: coffery_secret
      POSTGRES_DB: coffee_shop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffery -d coffee_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
